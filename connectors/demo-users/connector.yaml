---
apiVersion: "hdp.connector/v1alpha1"
kind: "ApiConnector"
metadata:
  name: "simple-manifest"
  displayName: "simple-manifest"
  source:
    type: "airbyte-manifest"
    originVersion: "0.1.0"
    originRef: "converter/src/test/resources/fixtures/airbyte/simple_manifest.yaml"
spec:
  connectionSpec:
    type: "object"
    required:
    - "base_url"
    - "api_key"
    properties:
      base_url:
        type: "string"
      api_key:
        type: "string"
  defaults:
    qps: "2"
    baseUrl: "{{ config['base_url'] }}"
  definitions:
    requesters:
      base_requester:
        type: "HttpRequester"
        urlBase: "{{ config['base_url'] }}"
        authenticator:
          $ref: "#/definitions/base_authenticator"
    authenticators:
      base_authenticator:
        type: "ApiKeyAuthenticator"
        header: "X-API-Key"
        api_token: "{{ config['api_key'] }}"
  signers: {}
  streams:
  - name: "users"
    qps: "2"
    request:
      requesterRef: "base_requester"
      path: "/users"
      method: "GET"
      signerRef: null
      qps: "2"
    schema:
      ref: "schemas/users.json"
      inline: null
