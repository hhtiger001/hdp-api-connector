version: "0.2.0"
spec:
  connection_specification:
    type: object
    required:
      - base_url
      - api_key
      - api_secret
    properties:
      base_url:
        type: string
      api_key:
        type: string
      api_secret:
        type: string
        airbyte_secret: true
definitions:
  signed_requester:
    type: HttpRequester
    url_base: "{{ config['base_url'] }}"
    authenticator:
      type: CustomAuthenticator
      class_name: source_signed.components.HmacAuthenticator
      api_key: "{{ config['api_key'] }}"
      api_secret: "{{ config['api_secret'] }}"
streams:
  - type: DeclarativeStream
    name: signed_records
    retriever:
      type: SimpleRetriever
      requester:
        $ref: "#/definitions/signed_requester"
        path: /signed-records
        http_method: GET
    schema_loader:
      type: InlineSchemaLoader
      schema:
        type: object
        properties:
          id:
            type: string
