version: "0.1.0"
spec:
  connection_specification:
    type: object
    required:
      - base_url
      - api_key
    properties:
      base_url:
        type: string
      api_key:
        type: string
definitions:
  base_authenticator:
    type: ApiKeyAuthenticator
    header: X-API-Key
    api_token: "{{ config['api_key'] }}"
  base_requester:
    type: HttpRequester
    urlBase: "{{ config['base_url'] }}"
    authenticator:
      $ref: "#/definitions/base_authenticator"
streams:
  - type: DeclarativeStream
    name: users
    retriever:
      type: SimpleRetriever
      requester:
        $ref: "#/definitions/base_requester"
    schema_loader:
      type: InlineSchemaLoader
      schema:
        type: object
        properties:
          id:
            type: string
          name:
            type: string
api_budget:
  policies:
    - type: HTTPAPIBudget
      rates:
        - limit: 120
          interval: minute
