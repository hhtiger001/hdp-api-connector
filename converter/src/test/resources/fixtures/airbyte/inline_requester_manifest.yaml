version: "0.5.0"
spec:
  connection_specification:
    type: object
definitions:
  base_requester:
    type: HttpRequester
    urlBase: "https://api.example.com"
streams:
  - type: DeclarativeStream
    name: orders
    retriever:
      type: SimpleRetriever
      requester:
        type: HttpRequester
        urlBase: "https://orders.example.com"
        path: /v2/orders
    schema_loader:
      type: InlineSchemaLoader
      schema:
        type: object
        properties:
          id:
            type: string
