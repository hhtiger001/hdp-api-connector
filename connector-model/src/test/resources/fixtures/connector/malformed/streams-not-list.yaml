apiVersion: hdp.connector/v1alpha1
kind: ApiConnector
metadata:
  name: broken-streams
  displayName: Broken Streams
spec:
  connectionSpec:
    type: object
    properties:
      base_url:
        type: string
  defaults:
    qps: 1
    baseUrl: "{{ config.base_url }}"
  definitions:
    requesters: {}
    authenticators: {}
  streams:
    name: users
