apiVersion: hdp.connector/v1alpha1
kind: ApiConnector
metadata:
  name: broken-streams
  displayName: Broken Streams
  source:
    type: airbyte-manifest
    originVersion: "0.1.0"
spec:
  connectionSpec:
    type: object
    properties:
      base_url:
        type: string
  defaults:
    qps: 1
    baseUrl: "{{ config.base_url }}"
  definitions:
    requesters: {}
    authenticators: {}
  streams:
    - null
